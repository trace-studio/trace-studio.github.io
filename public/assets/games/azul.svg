<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f7f7f7"/>
  <!-- Tile pattern grid -->
  <g stroke="#1a1a1a" stroke-width="0.8">
    <!-- 5x5 tile board -->
    <rect x="125" y="50" width="40" height="40" opacity="0.3"/>
    <rect x="170" y="50" width="40" height="40" opacity="0.1"/>
    <rect x="215" y="50" width="40" height="40" opacity="0.2"/>
    <rect x="260" y="50" width="40" height="40" opacity="0.1"/>

    <rect x="125" y="95" width="40" height="40" opacity="0.1"/>
    <rect x="170" y="95" width="40" height="40" opacity="0.25"/>
    <rect x="215" y="95" width="40" height="40" opacity="0.1"/>
    <rect x="260" y="95" width="40" height="40" opacity="0.3"/>

    <rect x="125" y="140" width="40" height="40" opacity="0.2"/>
    <rect x="170" y="140" width="40" height="40" opacity="0.1"/>
    <rect x="215" y="140" width="40" height="40" opacity="0.3"/>
    <rect x="260" y="140" width="40" height="40" opacity="0.1"/>

    <rect x="125" y="185" width="40" height="40" opacity="0.1"/>
    <rect x="170" y="185" width="40" height="40" opacity="0.2"/>
    <rect x="215" y="185" width="40" height="40" opacity="0.1"/>
    <rect x="260" y="185" width="40" height="40" opacity="0.25"/>

    <!-- Filled accent tiles -->
    <rect x="125" y="50" width="40" height="40" fill="#1a1a1a" opacity="0.06"/>
    <rect x="170" y="95" width="40" height="40" fill="#1a1a1a" opacity="0.06"/>
    <rect x="215" y="140" width="40" height="40" fill="#1a1a1a" opacity="0.06"/>
    <rect x="260" y="185" width="40" height="40" fill="#1a1a1a" opacity="0.06"/>

    <!-- Factory circle -->
    <circle cx="200" cy="260" r="20" opacity="0.12"/>
  </g>
</svg>
